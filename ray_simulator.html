<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numworks Ray Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00ffb4;
    --blue:   #00b4ff;
    --purple: #b400ff;
    --red:    #ff4466;
    --bg:     #06060c;
    --panel:  rgba(0,255,180,0.04);
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(0,255,180,0.45);
    text-transform: uppercase;
  }

  /* Canvas */
  #screen {
    display: block;
    image-rendering: pixelated;
    border: 1px solid rgba(0,255,180,0.18);
    box-shadow: 0 0 32px rgba(0,255,180,0.07);
  }

  /* Stats bar */
  #stats {
    display: flex;
    gap: 32px;
    background: var(--panel);
    border: 1px solid rgba(0,255,180,0.13);
    padding: 10px 24px;
    font-size: 12px;
    letter-spacing: 2px;
  }
  #stats span { color: rgba(255,255,255,0.35); }
  #stats strong { color: #fff; }
  #impact-val { color: var(--green); }
  #impact-val.hit { color: var(--red); }

  /* Controls */
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 660px;
  }

  .group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 14px;
  }
  .group-label {
    font-size: 9px;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }
  .group[data-color="green"] .group-label { color: var(--green); border-bottom: 1px solid rgba(0,255,180,0.15); padding-bottom:6px; }
  .group[data-color="blue"]  .group-label { color: var(--blue);  border-bottom: 1px solid rgba(0,180,255,0.15); padding-bottom:6px; }
  .group[data-color="purple"].group-label { color: var(--purple);border-bottom: 1px solid rgba(180,0,255,0.15); padding-bottom:6px; }

  .row { display: flex; flex-direction: column; gap: 4px; }
  .row-header { display: flex; justify-content: space-between; font-size: 10px; }
  .row-header .lbl { color: rgba(255,255,255,0.35); }
  .row-header .val { font-weight: bold; }
  .group[data-color="green"] .val { color: var(--green); }
  .group[data-color="blue"]  .val { color: var(--blue); }
  .group[data-color="purple"].val { color: var(--purple); }

  input[type=range] {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.08);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 0;
    background: currentColor;
    cursor: pointer;
  }
  .group[data-color="green"] input[type=range] { color: var(--green); accent-color: var(--green); }
  .group[data-color="blue"]  input[type=range] { color: var(--blue);  accent-color: var(--blue); }
  .group[data-color="purple"]input[type=range] { color: var(--purple);accent-color: var(--purple); }
</style>
</head>
<body>

<h1>Numworks Ray Simulator · 320×240</h1>

<canvas id="screen"></canvas>

<div id="stats">
  <span>ΔX = <strong id="dx-val">—</strong></span>
  <span>ΔY = <strong id="dy-val">—</strong></span>
  <span>IMPACT = <strong id="impact-val">—</strong></span>
</div>

<div id="controls">
  <div class="group" data-color="green">
    <div class="group-label">RAYON</div>
    <div class="row">
      <div class="row-header"><span class="lbl">Y₀</span><span class="val" id="y0-val">0</span></div>
      <input type="range" id="y0" min="0" max="240" step="1" value="0">
    </div>
  </div>

  <div class="group" data-color="blue">
    <div class="group-label">CARRÉ 1</div>
    <div class="row">
      <div class="row-header"><span class="lbl">X</span><span class="val" id="s1x-val">80</span></div>
      <input type="range" id="s1x" min="0" max="300" step="1" value="80">
    </div>
    <div class="row">
      <div class="row-header"><span class="lbl">Y</span><span class="val" id="s1y-val">80</span></div>
      <input type="range" id="s1y" min="0" max="220" step="1" value="80">
    </div>
  </div>

  <div class="group" data-color="purple">
    <div class="group-label">CARRÉ 2</div>
    <div class="row">
      <div class="row-header"><span class="lbl">X</span><span class="val" id="s2x-val">180</span></div>
      <input type="range" id="s2x" min="0" max="300" step="1" value="180">
    </div>
    <div class="row">
      <div class="row-header"><span class="lbl">Y</span><span class="val" id="s2y-val">180</span></div>
      <input type="range" id="s2y" min="0" max="220" step="1" value="180">
    </div>
  </div>
</div>

<script>
  const SW = 320, SH = 240, SQ = 20, SCALE = 2;
  const canvas = document.getElementById('screen');
  canvas.width  = SW * SCALE;
  canvas.height = SH * SCALE;
  const ctx = canvas.getContext('2d');

  const state = {
    y0: 0,
    s1: { x: 80,  y: 80  },
    s2: { x: 180, y: 180 }
  };

  // Bind sliders
  function bind(id, cb) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + '-val');
    el.addEventListener('input', () => {
      const v = parseInt(el.value);
      if (valEl) valEl.textContent = v;
      cb(v);
      draw();
    });
  }

  bind('y0',  v => state.y0 = v);
  bind('s1x', v => state.s1.x = v);
  bind('s1y', v => state.s1.y = v);
  bind('s2x', v => state.s2.x = v);
  bind('s2y', v => state.s2.y = v);

  function getRayHit() {
    const squares = [state.s1, state.s2];
    for (let x = 0; x <= SW; x++) {
      const y = x + state.y0;
      if (y < 0 || y > SH) continue;
      for (const sq of squares) {
        if (x >= sq.x && x <= sq.x + SQ && y >= sq.y && y <= sq.y + SQ) {
          return { x, y };
        }
      }
    }
    return null;
  }

  function draw() {
    const S = SCALE;

    // Background
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, SW*S, SH*S);

    // Grid
    ctx.strokeStyle = 'rgba(0,255,180,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= SW; x += 20) {
      ctx.beginPath(); ctx.moveTo(x*S, 0); ctx.lineTo(x*S, SH*S); ctx.stroke();
    }
    for (let y = 0; y <= SH; y += 20) {
      ctx.beginPath(); ctx.moveTo(0, y*S); ctx.lineTo(SW*S, y*S); ctx.stroke();
    }

    // Screen border
    ctx.strokeStyle = 'rgba(0,255,180,0.25)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, SW*S-2, SH*S-2);

    const hit = getRayHit();
    const sy = state.y0;
    const endX = hit ? hit.x : Math.min(SW, SH - sy);
    const endY = hit ? hit.y : Math.min(SH, SW + sy);

    // Ray
    if (sy >= 0 && sy <= SH) {
      ctx.shadowColor = hit ? '#ff4466' : '#00ffb4';
      ctx.shadowBlur = 14;
      ctx.strokeStyle = hit ? '#ff4466' : '#00ffb4';
      ctx.lineWidth =20;
      ctx.beginPath();
      ctx.moveTo(0, sy*S);
      ctx.lineTo(endX*S, endY*S);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Origin dot
      ctx.fillStyle = '#00ffb4';
      ctx.shadowColor = '#00ffb4';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(0, sy*S, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Impact dot
      if (hit) {
        ctx.shadowColor = '#ff4466';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ff4466';
        ctx.beginPath();
        ctx.arc(hit.x*S, hit.y*S, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // Draw squares
    function drawSq(sq, fill, glow, label) {
      ctx.shadowColor = glow;
      ctx.shadowBlur = 12;
      ctx.fillStyle = fill;
      ctx.fillRect(sq.x*S, sq.y*S, SQ*S, SQ*S);
      ctx.strokeStyle = glow;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sq.x*S, sq.y*S, SQ*S, SQ*S);
      ctx.shadowBlur = 0;

      ctx.font = `${9*S}px "Share Tech Mono", monospace`;
      ctx.fillStyle = glow;
      ctx.fillText(label, sq.x*S, sq.y*S - 4);
    }

    drawSq(state.s1, 'rgba(0,180,255,0.45)',  '#00b4ff', 'C1');
    drawSq(state.s2, 'rgba(180,0,255,0.45)', '#b400ff', 'C2');

    // Update stats
    const dx = Math.abs(state.s1.x - state.s2.x);
    const dy = Math.abs(state.s1.y - state.s2.y);
    document.getElementById('dx-val').textContent = dx;
    document.getElementById('dy-val').textContent = dy;
    const impEl = document.getElementById('impact-val');
    if (hit) {
      impEl.textContent = `(${hit.x}, ${hit.y})`;
      impEl.classList.add('hit');
    } else {
      impEl.textContent = '—';
      impEl.classList.remove('hit');
    }
  }

  draw();
</script>
</body>
</html>
